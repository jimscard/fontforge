name: macOS ARM64 Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-sign-notarize:
    runs-on: macos-14  # Apple Silicon (arm64)

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install \
            pkg-config cmake ninja \
            cairo coreutils fontconfig gettext giflib gtk+3 gtkmm3 \
            jpeg libpng libspiro libtiff libtool libuninameslist \
            python@3 wget woff2
          echo "PATH=$(brew --prefix)/opt/gettext/bin:$(brew --prefix)/opt/ruby/bin:$PATH" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix)/opt/libffi/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Build (arm64)
        run: |
          cmake -S . -B build -GNinja \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/target" \
            -DCMAKE_FIND_ROOT_PATH="$(brew --prefix)/opt/gettext" \
            -DENABLE_FONTFORGE_EXTRAS=ON
          ninja -C build install

      - name: Run tests
        run: CTEST_PARALLEL_LEVEL=100 ninja -C build check

      - name: Create app bundle and DMG
        run: CI=1 ninja -C build macbundle

      - name: Verify architecture
        run: |
          APP_BIN="build/osx/FontForge.app/Contents/Resources/opt/local/bin/fontforge"
          lipo -info "$APP_BIN"
          file "$APP_BIN" | grep -q arm64 || (echo "ERROR: binary is not arm64" && exit 1)

      - name: Prepare release asset
        id: asset
        run: |
          # Use the tag name (strip leading 'v') on tag builds, date+hash otherwise
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          fi
          SRC=$(find build/osx -name "FontForge-*.app.dmg" | head -1)
          DEST="build/osx/FontForge-${VERSION}-arm64.dmg"
          mv "$SRC" "$DEST"
          SHA256=$(shasum -a 256 "$DEST" | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dmg=$DEST"        >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256"   >> "$GITHUB_OUTPUT"

      - name: Sign and notarize
        if: ${{ env.APPLE_DEVELOPER_ID_CERT_P12 != '' }}
        env:
          FF_CERT_P12_B64:             ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}
          FF_CERT_P12_PASSWORD:        ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_PASSWORD }}
          FF_SIGN_IDENTITY:            ${{ secrets.APPLE_SIGN_IDENTITY }}
          FF_NOTARIZE_APPLE_ID:        ${{ secrets.APPLE_ID }}
          FF_NOTARIZE_PASSWORD:        ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          FF_NOTARIZE_TEAM_ID:         ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_ID_CERT_P12: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}
        run: |
          .github/workflows/scripts/ffsign-notarize.sh \
            build/osx/FontForge.app \
            "${{ steps.asset.outputs.dmg }}"

      - name: Recompute SHA256 after signing
        id: signed
        run: |
          # The signing step recreates the DMG from the signed app, so the
          # SHA256 computed before signing is stale. Recompute it here so the
          # Homebrew cask gets the correct checksum of the final release asset.
          SHA256=$(shasum -a 256 "${{ steps.asset.outputs.dmg }}" | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "FontForge ${{ steps.asset.outputs.version }} — macOS ARM64" \
            --notes "Notarized Apple Silicon (arm64) build of FontForge." \
            "${{ steps.asset.outputs.dmg }}"

      - name: Bump Homebrew tap
        if: github.ref_type == 'tag'
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          .github/workflows/scripts/bump-homebrew-cask.sh \
            "jimscard/homebrew-fontforge" \
            "${{ steps.asset.outputs.version }}" \
            "${{ steps.signed.outputs.sha256 }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FontForge-macOS-arm64
          path: build/osx/FontForge-*-arm64.dmg
          if-no-files-found: error
